<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="version" content="2.2.0" />
    <title>요모 두산 뽑기</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --main-pink: #ffd1dc;
        --dark-pink: #ff9aa2;
        --pastel-green: #b5ead7;
        --pastel-yellow: #fef9d9;
        --text-color: #555;
        --bg-color: #fff5f7;
        --white-shadow: rgba(255, 255, 255, 0.8);
        --dark-shadow: rgba(200, 180, 190, 0.2);
        --win-text: #2e7d32;
      }

      body {
        font-family: "Poppins", "Noto Sans KR", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        user-select: none;
        overflow: hidden;
      }

      h1 {
        color: #ff85a2;
        margin-bottom: 20px;
        font-weight: 700;
        letter-spacing: -1px;
      }

      /* --- Launcher (Parent Window) --- */
      .launcher {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        text-align: center;
      }
      .launcher h1 {
        font-size: 48px;
        margin: 0;
      }
      .launcher #launchBtn {
        background: linear-gradient(135deg, #ffb7b2, #ff9aa2);
        color: white;
        font-family: inherit;
        font-size: 28px;
        font-weight: 700;
        border: none;
        padding: 20px 80px;
        border-radius: 50px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 8px 20px rgba(255, 154, 162, 0.4);
      }
      .launcher #launchBtn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 28px rgba(255, 154, 162, 0.6);
      }
      .launcher #launchBtn:active {
        transform: translateY(0);
      }

      /* --- Controls Area --- */
      .controls {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px var(--dark-shadow);
        margin-bottom: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        width: 100%;
        max-width: 400px;
        border: 2px solid white;
      }
      .controls label {
        font-weight: 600;
        font-size: 14px;
        color: #888;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
      }
      .controls input,
      .controls textarea {
        background: #fafafa;
        border: 2px solid #f0f0f0;
        border-radius: 12px;
        padding: 12px;
        font-family: inherit;
        font-size: 14px;
        color: #555;
        transition: all 0.3s ease;
        width: 100%;
        box-sizing: border-box;
      }
      .controls input:focus,
      .controls textarea:focus {
        outline: none;
        border-color: var(--main-pink);
        background: white;
        box-shadow: 0 0 0 4px rgba(255, 209, 220, 0.3);
      }
      .controls textarea {
        height: 150px;
        resize: vertical;
      }

      button#startButton {
        background: linear-gradient(135deg, #ffb7b2, #ff9aa2);
        color: white;
        font-size: 16px;
        font-weight: 700;
        border: none;
        padding: 12px 40px;
        border-radius: 50px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 5px 15px rgba(255, 154, 162, 0.4);
        margin-top: 10px;
      }
      button#startButton:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 154, 162, 0.6);
      }

      /* --- The Board Grid --- */
      .board {
        display: grid;
        justify-content: center;
        gap: 10px;
        margin: 12px auto;
        padding: 20px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 20px;
      }
      .tile {
        width: 65px;
        height: 65px;
        background: white;
        border-radius: 16px;

        /* --- REMOVE line-height: 65px; --- */

        /* --- ADD THESE NEW CENTERING/WRAPPING RULES --- */
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 4px;
        box-sizing: border-box;
        text-align: center;
        line-height: 1.15; /* Tight line height for wrapped text */
        word-break: break-all; /* Forces long Korean words to wrap */
        /* ---------------------------------------------- */

        font-size: 28px;
        font-weight: 700;
        color: #ff6b6b;
        cursor: pointer;
        user-select: none;
        box-shadow: 0 4px 0 #efefef;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 2px solid #fff;
      }
      .tile:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 0 #e0e0e0;
        border-color: var(--main-pink);
        color: var(--dark-pink);
      }
      .tile.clicked {
        pointer-events: none;
        transform: translateY(2px);
        box-shadow: none;
      }
      .tile.prize {
        background: var(--pastel-green);
        color: #3d8b73;
        border-color: #92d5bf;
      }
      .tile.fail {
        background: var(--dark-pink);
        color: white;
        border-color: #e5868e;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        font-size: 36px;
      }

      /* --- Ticker --- */
      .ticker {
        width: 100%;
        max-width: 650px;
        overflow: hidden;
        white-space: nowrap;
        background: white;
        height: 44px;
        line-height: 44px;
        border-radius: 50px;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        position: relative;
        border: 2px solid var(--main-pink);
        margin-bottom: 50px;
      }
      .ticker span {
        position: absolute;
        white-space: nowrap;
        will-change: transform;
        color: #ff6b6b;
        font-weight: 700;
        font-size: 24px;
        padding: 0 10px;
      }

      /* --- Right Sidebar --- */
      .right-sidebar {
        position: absolute;
        right: 20px;
        top: 40px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
        max-width: 350px;
        pointer-events: none;
      }
      .panel {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 30px var(--dark-shadow);
        text-align: center;
        pointer-events: auto;
        border: 2px solid white;
        display: flex;
        flex-direction: column;
      }
      .panel h3 {
        margin: 0 0 15px 0;
        font-size: 18px;
        color: #555;
        background: var(--pastel-yellow);
        display: inline-block;
        padding: 5px 20px;
        border-radius: 20px;
        align-self: center;
      }

      .preset-controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .preset-select {
        padding: 10px;
        border-radius: 12px;
        border: 2px solid #f0f0f0;
        width: 100%;
        background: #fafafa;
        outline: none;
      }
      .preset-btn-group {
        display: flex;
        gap: 5px;
        justify-content: center;
      }
      .preset-btn {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
      }
      .btn-load {
        background: #b5ead7;
        color: #3d8b73;
      }
      .btn-save {
        background: #ffb7b2;
        color: white;
      }
      .btn-del {
        background: #e0e0e0;
        color: #888;
      }

      /* Admin Button */
      #adminBtn {
        position: fixed;
        top: 20px;
        left: 20px;
        background: #fff;
        color: #ff85a2;
        border: 2px solid #ff85a2;
        padding: 12px 20px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        z-index: 100;
        transition: 0.2s;
      }
      #adminBtn:hover {
        background: #ff85a2;
        color: white;
      }
    </style>
  </head>
  <body>
    <!-- SCRIPT 1: INTERCEPT FOR ADMIN VIEW -->
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const role = urlParams.get("role");
      const is_admin = role === "admin";
      const is_board = role === "board";

      // Initialize the communication channel
      const bc = new BroadcastChannel("bingo_channel");

      // --- LAUNCHER (PARENT WINDOW) ---
      // Default view with no ?role param: show only a "시작" button.
      // Clicking it opens the full raffle board in a child window.
      if (!is_admin && !is_board) {
        document.body.style.overflow = "hidden";
        document.body.innerHTML = `
          <div class="launcher">
            <h1>요모 두산 뽑기</h1>
            <button id="launchBtn">시작</button>
          </div>
        `;
        document.getElementById("launchBtn").addEventListener("click", () => {
          const boardUrl = window.location.href.split("?")[0] + "?role=board";
          window.open(
            boardUrl,
            "RaffleBoard",
            "width=1280,height=860,scrollbars=yes,menubar=no,toolbar=no",
          );
        });
        window.stop(); // Don't render the board UI in the parent window
      }

      if (is_admin) {
        // WE ARE IN THE SECRET ADMIN WINDOW. RENDER ONLY THE LIST.
        document.body.style.overflow = "auto";
        document.body.innerHTML = `
              <div style="max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                  <h2 style="text-align:center; color:#ff85a2; margin-top:0;">🕵️🕵️🕵️</h2>
                  <ul id="adminList" style="list-style:none; padding:0; font-size: 18px; line-height: 2.2;">
                    <li style="text-align:center; color:#bbb;">메인 화면에서 게임을 시작하면 번호가 나타납니다.</li>
                  </ul>
              </div>
          `;

        // Listen for new boards being generated
        bc.onmessage = (event) => {
          if (event.data.type === "NEW_BOARD") {
            const ul = document.getElementById("adminList");
            ul.innerHTML = ""; // Clear old list
            const values = event.data.values;

            let hasPrizes = false;
            values.forEach((prize, index) => {
              if (prize !== "꽝") {
                hasPrizes = true;
                ul.innerHTML += `<li style="border-bottom: 2px dashed #eee; padding: 8px 0; display:flex; justify-content:space-between;">
                              <span style="font-weight:bold; color:#ff9aa2;">#${index + 1}</span> 
                              <span style="color:#2e7d32; font-weight:bold;">${prize}</span>
                          </li>`;
              }
            });
            if (!hasPrizes)
              ul.innerHTML = `<li style="text-align:center; color:#bbb;">당첨 항목이 없습니다.</li>`;
          } else if (event.data.type === "RESET") {
            document.getElementById("adminList").innerHTML =
              `<li style="text-align:center; color:#bbb;">대기 중... (메인에서 시작을 눌러주세요)</li>`;
          }
        };

        // Request current state just in case this window was opened late
        bc.postMessage({ type: "REQUEST_STATE" });
        window.stop(); // Stop loading the rest of the stream UI
      }
    </script>

    <!-- MAIN STREAM UI (Only renders if NOT admin) -->

    <button id="adminBtn" onclick="openAdminPanel()">Open</button>

    <div class="controls">
      <label id="totalLabel">
        Total Pieces (Tiles)
        <input type="number" id="total" min="1" value="100" />
      </label>
      <label id="prizeLabel">
        Prize List (comma separated)
        <textarea
          id="prizeNames"
          placeholder="e.g. iPhone, Gift Card, $50"
        ></textarea>
      </label>
      <button id="startButton" onclick="handleButtonClick()">Start</button>
    </div>

    <div id="board" class="board"></div>
    <div id="prizeTicker" class="ticker"></div>

    <div class="right-sidebar">
      <div class="panel preset-panel">
        <h3>💾 리스트 저장소</h3>
        <div class="preset-controls">
          <select id="presetSelect" class="preset-select">
            <option value="" disabled selected>저장된 리스트 선택...</option>
          </select>
          <div class="preset-btn-group">
            <button class="preset-btn btn-load" onclick="loadPreset()">
              불러오기
            </button>
            <button class="preset-btn btn-save" onclick="savePreset()">
              저장
            </button>
            <button class="preset-btn btn-del" onclick="deletePreset()">
              삭제
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const winAudio = new Audio("win.wav");
      const failAudio = new Audio("fail.wav");
      winAudio.volume = 0.5;
      failAudio.volume = 0.5;
      function playSound(audioObj) {
        if (!audioObj) return;
        const sound = audioObj.cloneNode();
        sound.volume = audioObj.volume;
        sound.play().catch((e) => console.log(e));
      }

      let clickedTiles = [];
      let currentValues = []; // Store current board to send to late-opening admin windows

      const totalInput = document.getElementById("total"),
        prizeInput = document.getElementById("prizeNames"),
        startButton = document.getElementById("startButton"),
        totalLabel = document.getElementById("totalLabel"),
        prizeLabel = document.getElementById("prizeLabel"),
        board = document.getElementById("board"),
        prizeTicker = document.getElementById("prizeTicker"),
        presetPanel = document.querySelector(".preset-panel");

      // Handle requests from Admin window if it opened AFTER the board was generated
      bc.onmessage = (event) => {
        if (
          event.data.type === "REQUEST_STATE" &&
          currentValues.length > 0 &&
          startButton.textContent === "Reset"
        ) {
          bc.postMessage({ type: "NEW_BOARD", values: currentValues });
        }
      };

      function openAdminPanel() {
        const adminUrl =
          window.location.origin + window.location.pathname + "?role=admin";
        // Opens a clean, small popup window
        window.open(
          adminUrl,
          "AdminPanel",
          "width=450,height=600,scrollbars=yes,menubar=no,toolbar=no",
        );
      }

      window.addEventListener("DOMContentLoaded", () => {
        const savedTotal = localStorage.getItem("bingo_total"),
          savedPrizes = localStorage.getItem("bingo_prizes"),
          savedState = localStorage.getItem("bingo_state"),
          lastPresetName = localStorage.getItem("bingo_last_preset");
        const allPresets = getPresets();
        if (savedTotal) totalInput.value = savedTotal;
        if (lastPresetName && allPresets[lastPresetName])
          prizeInput.value = allPresets[lastPresetName];
        else if (savedPrizes) prizeInput.value = savedPrizes;
        if (savedState) {
          try {
            restoreBoard(JSON.parse(savedState));
          } catch (e) {
            console.error(e);
          }
        }
        updatePresetDropdown();
      });

      function parsePrizes(raw) {
        return raw
          .split(/\n|,/)
          .map((p) => p.trim())
          .filter((p) => p.length > 0);
      }

      function handleButtonClick() {
        if (startButton.textContent === "Start") {
          totalLabel.style.display = "none";
          prizeLabel.style.display = "none";
          presetPanel.style.display = "none";
          startButton.textContent = "Reset";
          board.style.visibility = "visible";
          prizeTicker.style.visibility = "visible";
          generateBoard();
        } else {
          board.innerHTML = "";
          prizeTicker.innerHTML = "";
          totalLabel.style.display = "";
          prizeLabel.style.display = "";
          presetPanel.style.display = "flex";
          board.style.visibility = "hidden";
          prizeTicker.style.visibility = "hidden";
          startButton.textContent = "Start";
          currentValues = [];
          localStorage.removeItem("bingo_state");
          // Tell Admin window we reset
          bc.postMessage({ type: "RESET" });
        }
      }

      function generateBoard() {
        const total = parseInt(totalInput.value),
          prizeRaw = prizeInput.value.trim();
        if (!total || total <= 0 || !prizeRaw)
          return alert("Please enter a valid number and at least one prize.");
        localStorage.setItem("bingo_total", total);
        localStorage.setItem("bingo_prizes", prizeRaw);

        const prizes = parsePrizes(prizeRaw);
        if (prizes.length > total) return alert("Too many prizes.");

        const values = [...prizes];
        while (values.length < total) values.push("꽝");
        for (let i = values.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [values[i], values[j]] = [values[j], values[i]];
        }

        board.innerHTML = "";
        const cols = Math.floor(Math.sqrt(total));
        board.style.gridTemplateColumns = `repeat(${cols}, 65px)`;
        clickedTiles = new Array(values.length).fill(false);
        currentValues = values;

        // --- BROADCAST TO ADMIN WINDOW ---
        bc.postMessage({ type: "NEW_BOARD", values: values });

        saveBoardState(values, clickedTiles, prizes);

        values.forEach((val, index) => {
          const tile = document.createElement("div");
          tile.className = "tile";
          tile.textContent = index + 1;
          tile.addEventListener("click", () => {
            if (clickedTiles[index]) return;
            tile.classList.add("clicked");
            clickedTiles[index] = true;
            if (val === "꽝") {
              tile.classList.add("fail");
              tile.textContent = "꽝";
              playSound(failAudio);
            } else {
              tile.classList.add("prize");
              tile.textContent = val;
              playSound(winAudio);

              // --- ADD THIS: Auto-shrink text to fit the box gracefully ---
              if (val.length >= 4) {
                tile.style.fontSize = "14px";
              } else if (val.length === 3) {
                tile.style.fontSize = "18px";
              } else {
                tile.style.fontSize = "28px"; // Default size for 1-2 chars
              }
            }
            saveBoardState(values, clickedTiles, prizes);
          });
          board.appendChild(tile);
        });
        buildTicker(prizes);
      }

      function buildTicker(prizes) {
        const tickerPrizes = prizes
          .filter((p) => p !== "꽝")
          .sort((a, b) => a.localeCompare(b));
        const ticker = document.getElementById("prizeTicker");
        if (tickerPrizes.length > 0) {
          ticker.innerHTML = `<span>${tickerPrizes.join(" • ")}</span>`;
          const span = ticker.querySelector("span"),
            distance = span.offsetWidth + ticker.offsetWidth,
            speed = 100;
          span.style.transform = `translateX(${ticker.offsetWidth}px)`;
          span.animate(
            [
              { transform: `translateX(${ticker.offsetWidth}px)` },
              { transform: `translateX(-${span.offsetWidth}px)` },
            ],
            {
              duration: (distance / speed) * 1000,
              iterations: Infinity,
              easing: "linear",
            },
          );
        } else ticker.innerHTML = "";
      }

      function saveBoardState(values, clickedTiles, originalPrizes) {
        localStorage.setItem(
          "bingo_state",
          JSON.stringify({
            values,
            clicked: clickedTiles,
            prizes: originalPrizes,
            started: true,
          }),
        );
      }

      function restoreBoard(state) {
        board.innerHTML = "";
        const total = state.values.length,
          cols = Math.floor(Math.sqrt(total));
        board.style.gridTemplateColumns = `repeat(${cols}, 65px)`;
        clickedTiles = state.clicked.slice();
        currentValues = state.values;

        bc.postMessage({ type: "NEW_BOARD", values: state.values });

        state.values.forEach((val, index) => {
          const tile = document.createElement("div");
          tile.className = "tile";
          tile.textContent = index + 1;
          if (state.clicked[index]) {
            tile.classList.add("clicked");
            if (val === "꽝") {
              tile.classList.add("fail");
              tile.textContent = "꽝";
            } else {
              tile.classList.add("prize");
              tile.textContent = val;
            }
          }
          tile.addEventListener("click", () => {
            if (clickedTiles[index]) return;
            tile.classList.add("clicked");
            clickedTiles[index] = true;
            if (val === "꽝") {
              tile.classList.add("fail");
              tile.textContent = "꽝";
              playSound(failAudio);
            } else {
              tile.classList.add("prize");
              tile.textContent = val;
              playSound(winAudio);

              // --- ADD THIS: Auto-shrink text to fit the box gracefully ---
              if (val.length >= 4) {
                tile.style.fontSize = "14px";
              } else if (val.length === 3) {
                tile.style.fontSize = "18px";
              } else {
                tile.style.fontSize = "28px"; // Default size for 1-2 chars
              }
            }
            saveBoardState(state.values, clickedTiles, state.prizes);
          });
          board.appendChild(tile);
        });
        buildTicker(
          state.prizes ||
            parsePrizes(document.getElementById("prizeNames").value),
        );
        if (state.started) {
          totalLabel.style.display = "none";
          prizeLabel.style.display = "none";
          presetPanel.style.display = "none";
          startButton.textContent = "Reset";
          board.style.visibility = "visible";
          prizeTicker.style.visibility = "visible";
        }
      }

      /* --- Preset Logic --- */
      const PRESET_STORAGE_KEY = "bingo_custom_presets",
        LAST_USED_PRESET_KEY = "bingo_last_preset";
      function getPresets() {
        return JSON.parse(localStorage.getItem(PRESET_STORAGE_KEY)) || {};
      }
      function updatePresetDropdown() {
        const presets = getPresets(),
          select = document.getElementById("presetSelect"),
          lastUsed = localStorage.getItem(LAST_USED_PRESET_KEY);
        select.innerHTML =
          '<option value="" disabled selected>저장된 리스트 선택...</option>';
        for (const [name] of Object.entries(presets)) {
          const option = document.createElement("option");
          option.value = option.textContent = name;
          select.appendChild(option);
        }
        if (lastUsed && presets[lastUsed]) select.value = lastUsed;
      }
      function savePreset() {
        const currentList = document.getElementById("prizeNames").value.trim();
        if (!currentList) return alert("저장할 리스트 내용이 없습니다.");
        const name = prompt("이 리스트의 이름을 입력하세요:");
        if (name) {
          const presets = getPresets();
          presets[name] = currentList;
          localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(presets));
          localStorage.setItem(LAST_USED_PRESET_KEY, name);
          updatePresetDropdown();
          alert(`"${name}" 리스트가 저장되었습니다.`);
        }
      }
      function loadPreset() {
        const name = document.getElementById("presetSelect").value;
        if (!name) return alert("불러올 리스트를 선택해주세요.");
        const presets = getPresets();
        if (presets[name]) {
          document.getElementById("prizeNames").value = presets[name];
          localStorage.setItem(LAST_USED_PRESET_KEY, name);
        }
      }
      function deletePreset() {
        const name = document.getElementById("presetSelect").value;
        if (!name) return;
        if (confirm(`정말 "${name}" 리스트를 삭제하시겠습니까?`)) {
          const presets = getPresets();
          delete presets[name];
          localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(presets));
          if (localStorage.getItem(LAST_USED_PRESET_KEY) === name)
            localStorage.removeItem(LAST_USED_PRESET_KEY);
          updatePresetDropdown();
        }
      }
    </script>
  </body>
</html>
